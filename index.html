<!DOCTYPE html>
<html lang="ru" data-theme="red">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PROJECT EGO — Путь от бариста к AI-создателю</title>
<meta name="description" content="Личная RPG-система управления жизнью, карьерой и финансами.">
<!-- PWA / iPhone: установка на домашний экран как приложение -->
<!-- Безопасность: строгая политика контента. Скрипты — только свой app.js,
     никаких внешних подключений. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; manifest-src 'self'; connect-src 'self'">
<meta name="theme-color" content="#08080c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EGO">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="stylesheet" href="styles.css">
<!-- Favicon: встроенный SVG, ничего внешнего не грузим -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230a0a0f'/%3E%3Cpath d='M9 8h14v4h-9v2h8v4h-8v2h9v4H9z' fill='%23e0263e'/%3E%3C/svg%3E">
</head>
<body>

<!-- ══════════════ КАРКАС ПРИЛОЖЕНИЯ ══════════════
     Всё содержимое экранов рендерится динамически из app.js.
     Здесь только скелет: шапка, навигация, контейнер, модальные слои. -->

<div id="app" class="app hidden">

  <!-- Шапка (HUD-полоса персонажа, видна везде) -->
  <header class="hud" id="hud">
    <div class="hud-left">
      <div class="hud-avatar" id="hudAvatar">1</div>
      <div class="hud-id">
        <div class="hud-name" id="hudName">—</div>
        <div class="hud-rank" id="hudRank">—</div>
      </div>
    </div>
    <div class="hud-center">
      <div class="hud-xpbar" title="XP до следующего уровня">
        <div class="hud-xpbar-fill" id="hudXpFill"></div>
      </div>
      <div class="hud-xptext" id="hudXpText">—</div>
    </div>
    <div class="hud-right">
      <span class="hud-chip" id="hudGold" title="Gold — внутренняя валюта наград">◈ 0</span>
      <span class="hud-chip" id="hudTokens" title="Жетоны защиты серии">🛡 0</span>
      <span class="hud-chip hud-streak" id="hudStreak" title="Серия активных дней">⚡ 0</span>
    </div>
  </header>

  <!-- Боковая навигация (десктоп) / нижняя (мобильный) -->
  <nav class="nav" id="nav"></nav>

  <!-- Основной контейнер экрана -->
  <main class="screen" id="screen"></main>

  <!-- Плавающая кнопка "+ Новый квест" -->
  <button class="fab" id="fabQuest" title="Новый квест (быстрое создание)">+</button>
</div>

<!-- Модальный слой -->
<div class="modal-backdrop hidden" id="modalBackdrop">
  <div class="modal" id="modalBox" role="dialog" aria-modal="true"></div>
</div>

<!-- Тосты (небольшие уведомления) -->
<div class="toasts" id="toasts"></div>

<!-- Экран загрузки / онбординга рендерится в #app из app.js -->
<div id="boot" class="boot hidden">
  <div class="boot-logo">PROJECT <span>EGO</span></div>
  <div class="boot-sub">Загрузка системы…</div>
</div>

<!-- Символический замок: отпугнуть случайного зрителя, не настоящая защита —
     весь код и так открыт на GitHub, пароль просто не даёт войти с ходу. -->
<div id="lockGate" class="boot lock-gate hidden">
  <div class="boot-logo">PROJECT <span>EGO</span></div>
  <form id="lockForm" class="lock-form" autocomplete="off">
    <input id="lockInput" class="f lock-input" type="password" placeholder="Пароль" autocomplete="off" autocapitalize="off" spellcheck="false">
    <button type="submit" class="btn primary">Войти</button>
  </form>
  <div id="lockError" class="lock-error hidden">Неверный пароль</div>
</div>

<script src="app.js"></script>
</body>
</html>
